name: Local Test
on:
  workflow_dispatch:
  push: { branches: ["main", "dev"] }

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run action with no config (dryrun)
        uses: ./
        with:
          theme: 'dracula'
          github_token: ${{ secrets.CONTRIBS_TOKEN }}